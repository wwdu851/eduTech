# ---------------------------
# Enums
# ---------------------------
enum KanbanColumn {
  IDEATION_DISCOVERY
  RESEARCH_INQUIRY
  SYNTHESIS_KNOWLEDGE
  TRIP_PLANNING_LOGISTICS
}

enum KnowledgeCategory {
  HISTORY
  ARCHITECTURE
  TRADE
  CULTURE
  FOOD
  POLITICS
  LOGISTICS
  PLANNING
  SCIENCE
  ENGINEERING
  GEOGRAPHY
  ECONOMICS
}

# ---------------------------
# Common Types
# ---------------------------
type User {
  id: ID!
  email: String!
}

type AuthPayload {
  token: String
  user: User
}

input RegisterInput {
  email: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

type KnowledgeNode {
  id: ID!
  label: String
  category: KnowledgeCategory
  description: String
}

type Relationship {
  sourceId: ID!
  targetId: ID!
  relationType: String
}

# ---------------------------
# Kanban Types
# ---------------------------
type KanbanCard {
  id: ID!
  title: String
  content: String
  columnId: KanbanColumn
  tags: [String]
  knowledgePoints: [KnowledgeNode]
}

# ---------------------------
# Queries
# ---------------------------
type Query {
  getBoard(limit: Int, offset: Int): [KanbanCard]
  getCard(cardId: ID!): KanbanCard
  getKnowledgeGraph: GraphData
}

type GraphData {
  nodes: [KnowledgeNode]
  edges: [Relationship]
}

# ---------------------------
# Mutations
# ---------------------------
type Mutation {
  register(input: RegisterInput!): AuthPayload
  login(input: LoginInput!): AuthPayload
  createCard(input: CreateCardInput!): KanbanCard
  updateCard(cardId: ID!, input: UpdateCardInput!): KanbanCard
  deleteCard(cardId: ID!): Boolean
  deleteKnowledgeNode(nodeId: ID!): Boolean
  moveCard(cardId: ID!, newColumnId: KanbanColumn!): KanbanCard
  startAIInquiry(cardId: ID!, userQuestion: String): AIInquiryResponse
}

input CreateCardInput {
  title: String!
  content: String
  columnId: KanbanColumn
  idempotencyKey: String
}

input UpdateCardInput {
  title: String
  content: String
  columnId: KanbanColumn
}

type SuggestedCard {
  title: String!
  content: String
  columnId: KanbanColumn!
  rationale: String
}

type AIInquiryResponse {
  inquiryId: ID!
  answer: String!
  extractedNodes: [KnowledgeNode]
  extractedEdges: [Relationship]
  suggestedCards: [SuggestedCard]
}
